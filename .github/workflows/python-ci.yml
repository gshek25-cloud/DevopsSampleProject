name: Python CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  APP_ENV: dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show environment
        run: echo "Running in $APP_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest

      - name: Confirm secret exists
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: echo "Secret is available to this step"

      - name: Create output file
        run: echo "Hello from test job" > output.txt

      - name: Show files before upload
        run: ls -R

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: output.txt

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: project-files

      - name: Show files after download
        run: ls -R

      - name: Read file
        run: cat output.txt
