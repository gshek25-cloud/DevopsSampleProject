name: Python CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest

      - name: Save files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: C:\Users\gshek\Desktop\AWS prctice\DevopsSampleProject\.github\workflows


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: project-files

      - name: Verify files
        run: ls -R

      - name: Build step
        run: echo "Build using artifacts successful!"