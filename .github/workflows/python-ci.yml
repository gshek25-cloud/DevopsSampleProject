name: Python CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  APP_ENV: dev

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: python -m flake8 app tests

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Show environment
        run: echo "Running in $APP_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest

      - name: Confirm secret exists
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: echo "Secret is available to this step"

      - name: Create output file
        run: echo "Hello from test job" > output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: output.txt

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: project-files
          path: downloaded-artifacts

      - name: Show files after download
        run: ls -R downloaded-artifacts

      - name: Read file
        run: cat downloaded-artifacts/output.txt

      - name: Build step
        run: echo "Build completed successfully"